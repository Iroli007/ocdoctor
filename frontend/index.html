<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCDoctor</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <!-- User selection overlay -->
    <div id="user-select-overlay" class="user-select-overlay">
      <div class="user-select-modal">
        <h2>欢迎使用 OCDoctor</h2>
        <p>请选择你的账号继续</p>
        <div id="user-buttons" class="user-buttons"></div>
      </div>
    </div>

    <div class="app-shell">
      <main class="workspace">
        <header class="workspace-header">
          <div class="workspace-branding">
            <div class="workspace-brand">
              <img src="/assets/logo.png" alt="OCDoctor" class="workspace-brand-mark" />
            </div>
            <div class="workspace-title-row">
              <h2 id="workspace-title">选择一个集合</h2>
              <select id="collection-switcher" class="collection-switcher"></select>
              <span id="current-user-display" class="current-user-display"></span>
              <button type="button" id="my-requests-btn" class="my-requests-btn">我的缺口</button>
            </div>
          </div>
        </header>

        <section class="template-toolbar template-toolbar-wide">
          <div class="template-copy">
            <strong>模板</strong>
            <p>只保留固定模板抽卡。点击一次，就随机抽出一张卡片和对应原文。</p>
          </div>
          <div id="template-list" class="template-list"></div>
          <div class="button-row">
            <button type="button" id="generate-button">随机抽卡</button>
            <button type="button" id="register-request-button">登记缺口</button>
            <span id="pool-status" class="pool-status" aria-live="polite">卡池准备中</span>
          </div>
        </section>

        <div class="focus-grid">
          <section class="panel card-focus-panel">
            <div class="section-heading">
              <h2>卡片</h2>
              <p>抽卡次数会记录在后台，下次打开仍然保留。</p>
            </div>
            <div id="cards-list" class="empty-state">还没有卡片。</div>
          </section>

          <section class="panel detail-panel">
            <div class="section-heading">
              <h2>原文引用</h2>
            </div>
            <div id="card-detail" class="empty-state">点击“随机抽卡”后，这里会显示对应原文。</div>
          </section>
        </div>
      </main>
    </div>

    <div id="status-bar" class="status-bar">准备就绪</div>

    <!-- Card Request Modal -->
    <div id="card-request-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>登记缺口</h3>
          <button type="button" class="modal-close" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body">
          <form id="card-request-form">
            <div class="form-group">
              <label for="requested-name">希望学习的卡片名称/知识点 *</label>
              <input type="text" id="requested-name" name="requested_name" required placeholder="例如：桂枝汤的功效" />
            </div>
            <div class="form-group">
              <label for="chapter-info">章节/目录（可选）</label>
              <input type="text" id="chapter-info" name="chapter_info" placeholder="例如：第5章 解表剂" />
            </div>
            <div class="form-group">
              <label for="request-notes">备注（可选）</label>
              <textarea id="request-notes" name="notes" rows="3" placeholder="补充说明..."></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">提交登记</button>
              <button type="button" class="btn-secondary modal-cancel">取消</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- My Requests Modal -->
    <div id="my-requests-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>我的缺口登记</h3>
          <button type="button" class="modal-close" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body">
          <div id="my-requests-list" class="requests-list"></div>
        </div>
      </div>
    </div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
