<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCDoctor</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- hidden: sidebar elements kept for JS compatibility -->
      <div style="display:none">
        <div id="collections-list"></div>
        <form id="collection-form"><select id="subject-select"></select></form>
      </div>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <div class="workspace-brand">
              <img src="/assets/logo.png" alt="OCDoctor" class="workspace-brand-mark" />
            </div>
            <div class="workspace-title-row">
              <h2 id="workspace-title">选择一个集合</h2>
              <select id="collection-switcher" class="collection-switcher"></select>
            </div>
          </div>
          <div class="workspace-stats">
            <div class="stat-card">
              <span id="document-count">0</span>
              <small>文档</small>
            </div>
            <div class="stat-card">
              <span id="card-count">0</span>
              <small>卡片</small>
            </div>
          </div>
        </header>

        <section class="composer">
          <form id="upload-form" class="upload-form">
            <div class="upload-copy">
              <strong>上传 PDF</strong>
              <p>导入教材、讲义或整理好的笔记 PDF，系统会先建 chunk，再按模板抽卡。</p>
            </div>
            <label>
              <span>目标集合</span>
              <select id="upload-collection-select" name="collection_id"></select>
            </label>
            <label class="file-input">
              <span>选择 PDF</span>
              <input id="pdf-input" name="file" type="file" accept="application/pdf" required />
            </label>
            <button type="submit">导入文档</button>
          </form>

          <div class="template-toolbar">
            <div class="template-copy">
              <strong>模板</strong>
              <p>固定模板优先，避免胡编乱造。</p>
            </div>
            <div id="template-list" class="template-list"></div>
            <div class="button-row">
              <button type="button" id="generate-button">生成卡片</button>
              <button type="button" id="export-button" class="button-ghost">导出 Markdown</button>
            </div>
          </div>
        </section>

        <div class="content-grid">
          <section class="panel">
            <div class="section-heading">
              <h2>文档</h2>
              <p>点击文档后，生成模板化卡片。</p>
            </div>
            <div id="documents-list" class="stack-list empty-state">还没有导入文档。</div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h2>卡片</h2>
              <p>生成后的卡片会自动保存到当前集合中。</p>
            </div>
            <div id="cards-list" class="stack-list empty-state">还没有卡片。</div>
          </section>

          <section class="panel detail-panel">
            <div class="section-heading">
              <h2>引用细节</h2>
              <p>查看卡片字段、出处页码和原文摘录。</p>
            </div>
            <div id="card-detail" class="empty-state">选择一张卡片查看详情。</div>
          </section>
        </div>
      </main>
    </div>

    <div id="status-bar" class="status-bar">准备就绪</div>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
